<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Biblicool Tool</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #d9dee7;
      --soft: #eef2f7;
      --accent: #111827;
      --danger: #9f1239;
      --ok: #166534;
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(246, 247, 249, 0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 14px 14px 12px;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    h1 {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      font-size: 20px;
      line-height: 1.1;
      margin: 0 0 10px;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .byline {
      color: #7b8494;
      font-size: 12px;
      font-style: italic;
      font-weight: 500;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    .searchBox {
      position: relative;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 999px;
      padding: 15px 48px 15px 16px;
      font-size: 17px;
      outline: none;
      box-shadow: 0 2px 10px rgba(17, 24, 39, 0.05);
    }

    input:focus {
      border-color: #9ca3af;
      box-shadow: 0 0 0 4px rgba(156, 163, 175, 0.22);
    }

    .clearBtn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      border: 0;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--muted);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
    }

    .suggestions {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 1px 2px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .suggestions::-webkit-scrollbar { display: none; }

    .chip {
      flex: 0 0 auto;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    main {
      max-width: 860px;
      margin: 0 auto;
      padding: 14px;
    }

    .status {
      margin: 10px 2px 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .notice {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #7c2d12;
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 14px;
      font-size: 14px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 15px;
      box-shadow: 0 2px 12px rgba(17, 24, 39, 0.04);
    }

    .cardHead {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }

    .version {
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -0.01em;
    }

    .fullName {
      color: var(--muted);
      font-size: 13px;
      text-align: right;
    }

    .ref {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 7px;
    }

    .text {
      font-size: 17px;
      white-space: pre-wrap;
    }

    .loading {
      color: var(--muted);
      font-style: italic;
    }

    .error {
      color: var(--danger);
      font-size: 14px;
    }

    .locked {
      opacity: 0.88;
      background: linear-gradient(180deg, #fff, #fafafa);
    }

    .locked .text {
      color: var(--muted);
      font-size: 15px;
    }

    .small {
      font-size: 13px;
      color: var(--muted);
    }

    .footer {
      color: var(--muted);
      font-size: 12px;
      padding: 16px 2px 30px;
    }

    @media (min-width: 700px) {
      h1 { font-size: 24px; }
      .grid { grid-template-columns: 1fr 1fr; }
      .card:first-child { grid-column: 1 / -1; }
      .text { font-size: 18px; }
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div class="wrap">
      <h1><span>Biblicool Tool</span><span class="byline">by Jordan</span></h1>
      <div class="searchBox">
        <input id="search" type="search" autocomplete="off" autocapitalize="words"
          placeholder="Type a verse, chapter, or book. Example: Colossians 3:23" />
        <button id="clear" class="clearBtn" aria-label="Clear search">×</button>
      </div>
      <div id="suggestions" class="suggestions" aria-label="Suggestions"></div>
    </div>
  </header>

  <main>
    <div id="status" class="status" hidden></div>

    <section id="results" class="grid"></section>

    <section id="locked" class="grid" style="margin-top: 12px;"></section>

  </main>

  <script>
    const FREE_VERSIONS = [
      { label: "KJV", name: "King James Version", id: "kjv" },
      { label: "WEB", name: "World English Bible", id: "web" },
      { label: "ASV", name: "American Standard Version 1901", id: "asv" },
      { label: "BBE", name: "Bible in Basic English", id: "bbe" },
      { label: "DARBY", name: "Darby Bible", id: "darby" },
      { label: "DRA", name: "Douay-Rheims 1899 American Edition", id: "dra" },
      { label: "YLT", name: "Young's Literal Translation, NT only", id: "ylt" },
      { label: "OEB-US", name: "Open English Bible, US Edition", id: "oeb-us" },
      { label: "OEB-CW", name: "Open English Bible, Commonwealth Edition", id: "oeb-cw" },
      { label: "WEBBE", name: "World English Bible, British Edition", id: "webbe" }
    ];

    const POPULAR_LOCKED = [
      ["NKJV", "New King James Version"],
      ["ESV", "English Standard Version"],
      ["NIV", "New International Version"],
      ["NLT", "New Living Translation"],
      ["NASB", "New American Standard Bible"],
      ["CSB", "Christian Standard Bible"],
      ["NRSVue", "New Revised Standard Version Updated Edition"],
      ["AMP", "Amplified Bible"],
      ["NET", "New English Translation"],
      ["GNT", "Good News Translation"],
      ["CEV", "Contemporary English Version"],
      ["CEB", "Common English Bible"],
      ["MSG", "The Message"],
      ["LSB", "Legacy Standard Bible"],
      ["HCSB", "Holman Christian Standard Bible"],
      ["NABRE", "New American Bible Revised Edition"]
    ];

    const BOOKS = [
      "Genesis", "Exodus", "Leviticus", "Numbers", "Deuteronomy", "Joshua", "Judges", "Ruth",
      "1 Samuel", "2 Samuel", "1 Kings", "2 Kings", "1 Chronicles", "2 Chronicles", "Ezra",
      "Nehemiah", "Esther", "Job", "Psalm", "Proverbs", "Ecclesiastes", "Song of Solomon",
      "Isaiah", "Jeremiah", "Lamentations", "Ezekiel", "Daniel", "Hosea", "Joel", "Amos",
      "Obadiah", "Jonah", "Micah", "Nahum", "Habakkuk", "Zephaniah", "Haggai", "Zechariah",
      "Malachi", "Matthew", "Mark", "Luke", "John", "Acts", "Romans", "1 Corinthians",
      "2 Corinthians", "Galatians", "Ephesians", "Philippians", "Colossians", "1 Thessalonians",
      "2 Thessalonians", "1 Timothy", "2 Timothy", "Titus", "Philemon", "Hebrews", "James",
      "1 Peter", "2 Peter", "1 John", "2 John", "3 John", "Jude", "Revelation"
    ];

    const EXAMPLES = [
      "John 3:16", "Romans 8:28", "Psalm 23", "Genesis 1:1", "Proverbs 3:5-6",
      "Colossians 3:23", "Philippians 4:13", "Matthew 6:33", "Acts 2:38"
    ];

    const BOOK_ALIASES = {
      "gen": "Genesis", "ge": "Genesis",
      "ex": "Exodus", "exo": "Exodus",
      "lev": "Leviticus", "levi": "Leviticus",
      "num": "Numbers", "nu": "Numbers",
      "deut": "Deuteronomy", "deu": "Deuteronomy", "dt": "Deuteronomy",
      "josh": "Joshua", "jos": "Joshua",
      "judg": "Judges", "jdg": "Judges",
      "1 sam": "1 Samuel", "1sam": "1 Samuel", "i samuel": "1 Samuel",
      "2 sam": "2 Samuel", "2sam": "2 Samuel", "ii samuel": "2 Samuel",
      "1 kings": "1 Kings", "1kgs": "1 Kings", "1 ki": "1 Kings",
      "2 kings": "2 Kings", "2kgs": "2 Kings", "2 ki": "2 Kings",
      "1 chron": "1 Chronicles", "1chr": "1 Chronicles", "1 ch": "1 Chronicles",
      "2 chron": "2 Chronicles", "2chr": "2 Chronicles", "2 ch": "2 Chronicles",
      "neh": "Nehemiah",
      "est": "Esther", "esth": "Esther",
      "ps": "Psalm", "psa": "Psalm", "psalm": "Psalm", "psalms": "Psalm",
      "prov": "Proverbs", "pro": "Proverbs",
      "eccl": "Ecclesiastes", "ecc": "Ecclesiastes",
      "song": "Song of Solomon", "song of songs": "Song of Solomon", "sos": "Song of Solomon",
      "isa": "Isaiah",
      "jer": "Jeremiah",
      "lam": "Lamentations",
      "ezek": "Ezekiel", "eze": "Ezekiel",
      "dan": "Daniel",
      "hos": "Hosea",
      "obad": "Obadiah",
      "jon": "Jonah",
      "mic": "Micah",
      "nah": "Nahum",
      "hab": "Habakkuk",
      "zeph": "Zephaniah", "zep": "Zephaniah",
      "hag": "Haggai",
      "zech": "Zechariah", "zec": "Zechariah",
      "mal": "Malachi",
      "matt": "Matthew", "mat": "Matthew", "mt": "Matthew",
      "mk": "Mark", "mrk": "Mark",
      "lk": "Luke", "luk": "Luke",
      "jn": "John", "jhn": "John",
      "acts": "Acts", "act": "Acts",
      "rom": "Romans",
      "1 cor": "1 Corinthians", "1cor": "1 Corinthians", "i corinthians": "1 Corinthians",
      "2 cor": "2 Corinthians", "2cor": "2 Corinthians", "ii corinthians": "2 Corinthians",
      "gal": "Galatians",
      "eph": "Ephesians",
      "phil": "Philippians", "php": "Philippians",
      "col": "Colossians", "colossian": "Colossians", "colossians": "Colossians",
      "1 thess": "1 Thessalonians", "1thess": "1 Thessalonians", "1 thes": "1 Thessalonians",
      "2 thess": "2 Thessalonians", "2thess": "2 Thessalonians", "2 thes": "2 Thessalonians",
      "1 tim": "1 Timothy", "1tim": "1 Timothy",
      "2 tim": "2 Timothy", "2tim": "2 Timothy",
      "tit": "Titus",
      "philem": "Philemon", "phm": "Philemon",
      "heb": "Hebrews",
      "jas": "James", "jam": "James",
      "1 pet": "1 Peter", "1pet": "1 Peter",
      "2 pet": "2 Peter", "2pet": "2 Peter",
      "1 jn": "1 John", "1john": "1 John",
      "2 jn": "2 John", "2john": "2 John",
      "3 jn": "3 John", "3john": "3 John",
      "rev": "Revelation", "re": "Revelation", "revelations": "Revelation"
    };

    function cleanBookKey(value) {
      return value
        .toLowerCase()
        .replace(/[.]/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function levenshtein(a, b) {
      if (a === b) return 0;
      if (!a.length) return b.length;
      if (!b.length) return a.length;

      const row = Array.from({ length: b.length + 1 }, (_, i) => i);

      for (let i = 1; i <= a.length; i++) {
        let prev = row[0];
        row[0] = i;

        for (let j = 1; j <= b.length; j++) {
          const temp = row[j];
          row[j] = Math.min(
            row[j] + 1,
            row[j - 1] + 1,
            prev + (a[i - 1] === b[j - 1] ? 0 : 1)
          );
          prev = temp;
        }
      }

      return row[b.length];
    }

    function bestBookMatch(rawBook) {
      const cleaned = cleanBookKey(rawBook);
      if (!cleaned) return null;

      if (BOOK_ALIASES[cleaned]) return BOOK_ALIASES[cleaned];

      const compact = cleaned.replace(/\s+/g, "");
      if (BOOK_ALIASES[compact]) return BOOK_ALIASES[compact];

      const candidates = [
        ...BOOKS.map(book => ({ key: cleanBookKey(book), book })),
        ...Object.entries(BOOK_ALIASES).map(([key, book]) => ({ key: cleanBookKey(key), book }))
      ];

      let best = null;

      for (const candidate of candidates) {
        const candidateCompact = candidate.key.replace(/\s+/g, "");
        const distance = Math.min(
          levenshtein(cleaned, candidate.key),
          levenshtein(compact, candidateCompact)
        );

        const maxLen = Math.max(compact.length, candidateCompact.length);
        const allowed = maxLen <= 5 ? 1 : maxLen <= 9 ? 2 : 3;

        if (distance <= allowed && (!best || distance < best.distance)) {
          best = { book: candidate.book, distance };
        }
      }

      return best ? best.book : null;
    }

    function autoCorrectReference(query) {
      const q = normalizeQuery(query);
      if (!q) return q;

      // Match "Book 3", "Book 3:23", "Book 3:23-24", etc.
      const match = q.match(/^(.+?)\s+(\d+)(?::\s*(\d+))?\s*(-\s*\d+)?\s*$/);
      if (!match) return q;

      const rawBook = match[1];
      const chapter = match[2];
      const verse = match[3] ? ":" + match[3].replace(/\s+/g, "") : "";
      const range = match[4] ? match[4].replace(/\s+/g, "") : "";
      const correctedBook = bestBookMatch(rawBook);

      if (!correctedBook) return q;

      return `${correctedBook} ${chapter}${verse}${range}`;
    }

    const searchInput = document.getElementById("search");
    const clearBtn = document.getElementById("clear");
    const suggestionsEl = document.getElementById("suggestions");
    const statusEl = document.getElementById("status");
    const resultsEl = document.getElementById("results");
    const lockedEl = document.getElementById("locked");

    let debounceTimer = null;
    let activeController = null;
    const cache = new Map();

    function normalizeQuery(q) {
      return q.trim().replace(/\s+/g, " ");
    }

    function looksFetchable(q) {
      // Allows "John 3", "John 3:16", "Psalm 23", "1 John 4:8", etc.
      return /\b\d+\s*:?\s*\d*\b/.test(q) && /[a-zA-Z]/.test(q);
    }

    function setStatus(msg) {
      if (statusEl) statusEl.textContent = "";
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function makeCard(version, inner, extraClass = "") {
      return `
        <article class="card ${extraClass}">
          <div class="cardHead">
            <div class="version">${escapeHtml(version.label)}</div>
            <div class="fullName">${escapeHtml(version.name)}</div>
          </div>
          ${inner}
        </article>
      `;
    }

    function renderLoading(query) {
      resultsEl.innerHTML = FREE_VERSIONS.map(v => makeCard(v, `
        <div class="ref">${escapeHtml(query)}</div>
        <div class="text loading">Loading…</div>
      `)).join("");
    }

    function renderLockedCards(query) {
      lockedEl.innerHTML = POPULAR_LOCKED.map(([label, name]) => makeCard(
        { label, name },
        `
          <div class="ref">${escapeHtml(query || "Reference")}</div>
          <div class="text">Locked in this no-key demo. Connect a licensed API such as API.Bible, ESV API, or another approved source to display this translation.</div>
        `,
        "locked"
      )).join("");
    }

    function renderSuggestions() {
      const corrected = autoCorrectReference(searchInput.value);
      const q = normalizeQuery(corrected || searchInput.value).toLowerCase();
      let suggestions = [];

      if (!q) {
        suggestions = EXAMPLES;
      } else {
        const bookMatches = BOOKS
          .filter(book => book.toLowerCase().includes(q) || q.includes(book.toLowerCase()))
          .slice(0, 8);

        suggestions = [
          ...bookMatches.flatMap(book => [`${book} 1`, `${book} 1:1`]),
          ...EXAMPLES.filter(ex => ex.toLowerCase().includes(q))
        ];
      }

      suggestions = [...new Set(suggestions)].slice(0, 12);

      suggestionsEl.innerHTML = suggestions.map(s =>
        `<button class="chip" type="button" data-value="${escapeHtml(s)}">${escapeHtml(s)}</button>`
      ).join("");
    }

    async function fetchVersion(query, version, signal) {
      const key = `${version.id}|${query.toLowerCase()}`;
      if (cache.has(key)) return cache.get(key);

      const url = `https://bible-api.com/${encodeURIComponent(query)}?translation=${encodeURIComponent(version.id)}`;
      const res = await fetch(url, { signal });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      const data = await res.json();

      if (data.error) {
        throw new Error(data.error);
      }

      const cleaned = {
        reference: data.reference || query,
        text: (data.text || "").trim()
      };

      cache.set(key, cleaned);
      return cleaned;
    }

    async function runSearch() {
      let query = normalizeQuery(searchInput.value);
      const correctedQuery = autoCorrectReference(query);

      if (correctedQuery && correctedQuery !== query) {
        query = correctedQuery;
        searchInput.value = correctedQuery;
      }

      if (!query) {
        resultsEl.innerHTML = "";
        lockedEl.innerHTML = "";
        setStatus("");
        renderSuggestions();
        return;
      }

      renderSuggestions();
      renderLockedCards(query);

      if (!looksFetchable(query)) {
        resultsEl.innerHTML = "";
        setStatus("");
        return;
      }

      if (activeController) activeController.abort();
      activeController = new AbortController();

      setStatus("");
      renderLoading(query);

      const settled = await Promise.allSettled(
        FREE_VERSIONS.map(version => fetchVersion(query, version, activeController.signal))
      );

      resultsEl.innerHTML = settled.map((result, index) => {
        const version = FREE_VERSIONS[index];

        if (result.status === "fulfilled") {
          return makeCard(version, `
            <div class="ref">${escapeHtml(result.value.reference)}</div>
            <div class="text">${escapeHtml(result.value.text)}</div>
          `);
        }

        const msg = result.reason?.name === "AbortError"
          ? "Canceled."
          : "Not available for this reference or translation.";

        return makeCard(version, `
          <div class="ref">${escapeHtml(query)}</div>
          <div class="error">${escapeHtml(msg)}</div>
        `);
      }).join("");
    }

    function debouncedRun() {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(runSearch, 750);
      renderSuggestions();
    }

    searchInput.addEventListener("input", debouncedRun);

    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      searchInput.focus();
      runSearch();
    });

    suggestionsEl.addEventListener("click", event => {
      const chip = event.target.closest(".chip");
      if (!chip) return;
      searchInput.value = chip.dataset.value;
      runSearch();
    });

    renderSuggestions();
  </script>
</body>
</html>
